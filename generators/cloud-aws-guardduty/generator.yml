# AWS GuardDuty Findings Generator
#
# Produces realistic AWS GuardDuty security findings (ECS-compatible JSON)
# matching the Elastic AWS GuardDuty integration field structure. Covers
# 8 finding categories: Recon, UnauthorizedAccess, Policy, Trojan, Impact,
# CryptoCurrency, Stealth, and Backdoor across EC2, IAM, and S3 resources.
#
# Usage:
#   eventum generate --path generators/cloud-aws-guardduty/generator.yml --id guardduty --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    params:
      agent_id: "b2c3d4e5-f6a7-8901-bcde-fa2345678901"
      agent_version: "8.17.0"

    samples:
      accounts:
        type: csv
        source: samples/accounts.csv
        header: true
      regions:
        type: csv
        source: samples/regions.csv
        header: true
      instances:
        type: csv
        source: samples/instances.csv
        header: true
      users:
        type: csv
        source: samples/users.csv
        header: true
      buckets:
        type: csv
        source: samples/buckets.csv
        header: true
      threat_actors:
        type: json
        source: samples/threat_actors.json
      finding_types:
        type: json
        source: samples/finding_types.json
      dns_domains:
        type: json
        source: samples/dns_domains.json
      api_calls:
        type: json
        source: samples/api_calls.json

    templates:
      # Recon ~25% (port probes + IAM recon)
      - recon_port_probe:
          template: templates/recon-port-probe.json.jinja
          chance: 150
      - recon_iam_tor:
          template: templates/recon-iam-tor.json.jinja
          chance: 100

      # UnauthorizedAccess ~20% (network + IAM)
      - unauth_network:
          template: templates/unauth-network.json.jinja
          chance: 120
      - unauth_iam:
          template: templates/unauth-iam.json.jinja
          chance: 80

      # Policy ~15% (IAM root + S3 bucket)
      - policy_iam:
          template: templates/policy-iam.json.jinja
          chance: 50
      - policy_s3:
          template: templates/policy-s3.json.jinja
          chance: 100

      # Trojan ~10% (network + DNS)
      - trojan_network:
          template: templates/trojan-network.json.jinja
          chance: 55
      - trojan_dns:
          template: templates/trojan-dns.json.jinja
          chance: 45

      # Impact ~10% (network + DNS)
      - impact_network:
          template: templates/impact-network.json.jinja
          chance: 55
      - impact_dns:
          template: templates/impact-dns.json.jinja
          chance: 45

      # CryptoCurrency ~8% (DNS + network)
      - crypto_dns:
          template: templates/crypto-dns.json.jinja
          chance: 40
      - crypto_network:
          template: templates/crypto-network.json.jinja
          chance: 40

      # Stealth ~7% (IAM + S3)
      - stealth_iam:
          template: templates/stealth-iam.json.jinja
          chance: 40
      - stealth_s3:
          template: templates/stealth-s3.json.jinja
          chance: 30

      # Backdoor ~5% (network DoS + DNS C&C)
      - backdoor_network:
          template: templates/backdoor-network.json.jinja
          chance: 25
      - backdoor_dns:
          template: templates/backdoor-dns.json.jinja
          chance: 25

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
