# Palo Alto Networks Threat Log Event Generator
#
# Produces realistic PAN-OS Threat log events (ECS-compatible JSON) matching
# the Elastic panw integration field structure. Covers non-URL threat subtypes:
# spyware (DNS sinkhole + C2 callback), vulnerability (IPS), virus (antivirus),
# wildfire (cloud analysis), file (file type detection), and scan (recon).
#
# Usage:
#   eventum generate --path generators/network-paloalto-threat/generator.yml --id panw-threat --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # Environment parameters — edit for your setup
    params:
      hostname: PA-5260
      domain: CORP
      serial_number: "007200001056"
      nat_ip: "198.51.100.1"
      src_zone: trust
      dst_zone: untrust
      inbound_interface: ethernet1/2
      outbound_interface: ethernet1/1
      virtual_sys: vsys1
      log_profile: Log-to-Syslog
      src_network: "10.0.0.0-10.255.255.255"
      agent_id: "e4f8c1a2-9b3d-4e5f-a6c7-d8e9f0a1b2c3"
      agent_version: "8.17.0"

    # Sample data
    samples:
      internal_hosts:
        type: csv
        source: samples/internal_hosts.csv
        header: true
      usernames:
        type: csv
        source: samples/usernames.csv
        header: true
      threat_signatures:
        type: json
        source: samples/threat_signatures.json
      applications:
        type: json
        source: samples/applications.json
      malicious_domains:
        type: json
        source: samples/malicious_domains.json
      security_rules:
        type: json
        source: samples/security_rules.json

    # Event templates with realistic frequency distribution
    # Weights approximate a production enterprise with threat prevention enabled
    templates:
      - spyware_dns:
          template: templates/spyware-dns.json.jinja
          chance: 350
      - spyware_callback:
          template: templates/spyware-callback.json.jinja
          chance: 150
      - vulnerability:
          template: templates/vulnerability.json.jinja
          chance: 200
      - virus:
          template: templates/virus.json.jinja
          chance: 120
      - wildfire:
          template: templates/wildfire.json.jinja
          chance: 80
      - file_scan:
          template: templates/file-scan.json.jinja
          chance: 100

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
