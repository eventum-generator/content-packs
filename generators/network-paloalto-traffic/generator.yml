# Palo Alto Networks Traffic Log Generator
#
# Produces realistic PAN-OS Traffic log events (ECS-compatible JSON) matching
# the Elastic panw integration field structure. Traffic logs record network
# session information including session start, end, drop, and deny events
# with zone-aware flow profiles, NAT translation, and byte/packet counters.
#
# Usage:
#   eventum generate --path generators/network-paloalto-traffic/generator.yml --id panw-traffic --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # Environment parameters — edit for your setup
    params:
      hostname: PA-3260
      domain: CORP
      serial_number: "012801096514"
      nat_ip: "198.51.100.1"
      virtual_sys: vsys1
      log_profile: Log-to-Syslog
      src_network: "10.0.0.0-10.255.255.255"
      agent_id: "f7a3b1c2-8d4e-5f6a-b7c8-d9e0f1a2b3c4"
      agent_version: "8.17.0"

    # Sample data
    samples:
      internal_hosts:
        type: csv
        source: samples/internal_hosts.csv
        header: true
      server_hosts:
        type: csv
        source: samples/server_hosts.csv
        header: true
      usernames:
        type: csv
        source: samples/usernames.csv
        header: true
      applications:
        type: json
        source: samples/applications.json
      security_rules:
        type: json
        source: samples/security_rules.json
      url_categories:
        type: json
        source: samples/url_categories.json

    # Event templates with realistic frequency distribution
    # Weights approximate production enterprise firewall traffic logging
    templates:
      - traffic_end:
          template: templates/traffic-end.json.jinja
          chance: 720
      - traffic_start:
          template: templates/traffic-start.json.jinja
          chance: 140
      - traffic_drop:
          template: templates/traffic-drop.json.jinja
          chance: 70
      - traffic_deny:
          template: templates/traffic-deny.json.jinja
          chance: 70

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
