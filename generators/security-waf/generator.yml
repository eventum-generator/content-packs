# Web Application Firewall (WAF) Log Generator
#
# Produces realistic WAF log events (ECS-compatible JSON) covering OWASP CRS
# rule detections, bot management, rate limiting, geo-blocking, and CAPTCHA
# challenges. Events model a production WAF protecting a web application with
# ~75% allowed traffic and ~25% security events.
#
# Usage:
#   eventum generate --path generators/security-waf/generator.yml --id waf --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # Environment parameters — edit for your setup
    params:
      hostname: waf-prod-01
      server_name: app.example.com
      server_ip: "10.0.1.50"
      waf_vendor: "ModSecurity"
      waf_mode: "blocking"
      agent_id: "c4f2e8a1-7b3d-4e9f-a6c1-d5e7f8a9b0c2"
      agent_version: "8.17.0"

    # Sample data
    samples:
      urls:
        type: json
        source: samples/urls.json
      user_agents:
        type: json
        source: samples/user-agents.json
      waf_rules:
        type: json
        source: samples/waf-rules.json
      attack_payloads:
        type: json
        source: samples/attack-payloads.json
      geo_data:
        type: json
        source: samples/geo-data.json

    # Event templates with realistic frequency distribution
    # ~75% allowed, ~25% security events (alerts, blocks, challenges)
    templates:
      # Allowed traffic — clean requests passing all WAF rules
      - allowed:
          template: templates/allowed.json.jinja
          chance: 750

      # SQL Injection attempts (OWASP CRS 942xxx)
      - sqli:
          template: templates/sqli.json.jinja
          chance: 50

      # Cross-Site Scripting attempts (OWASP CRS 941xxx)
      - xss:
          template: templates/xss.json.jinja
          chance: 40

      # Remote Code Execution attempts (OWASP CRS 932xxx)
      - rce:
          template: templates/rce.json.jinja
          chance: 20

      # Local File Inclusion / Path Traversal (OWASP CRS 930xxx)
      - lfi:
          template: templates/lfi.json.jinja
          chance: 20

      # Bot detection — scanners, crawlers, empty UAs
      - bot_detection:
          template: templates/bot-detection.json.jinja
          chance: 30

      # Rate limiting — excessive request velocity
      - rate_limit:
          template: templates/rate-limit.json.jinja
          chance: 40

      # Geo-blocking — requests from restricted countries
      - geo_block:
          template: templates/geo-block.json.jinja
          chance: 20

      # CAPTCHA challenges — suspicious behavior triggers
      - captcha_challenge:
          template: templates/captcha-challenge.json.jinja
          chance: 15

      # Server-Side Request Forgery (OWASP CRS 934xxx)
      - ssrf:
          template: templates/ssrf.json.jinja
          chance: 15

      # Protocol violations — invalid headers, restricted extensions
      - protocol_violation:
          template: templates/protocol-violation.json.jinja
          chance: 15

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
