# MySQL Enterprise Audit Log Generator
#
# Produces realistic MySQL Enterprise Audit events (ECS-compatible JSON) matching
# the output of Filebeat / Elastic Agent with the mysql_enterprise integration.
# Events follow the MySQL Enterprise Audit Plugin JSON format covering all four
# audit classes: audit, connection, general, and table_access.
#
# Covers: connect/disconnect, DML queries (SELECT/INSERT/UPDATE/DELETE),
# DDL schema changes, GRANT/REVOKE, admin commands, query errors,
# table access events, and failed authentication attempts.
#
# Usage:
#   eventum generate --path generators/database-mysql-audit/generator.yml --id mysql --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # Environment parameters — edit for your setup
    params:
      agent_version: "8.17.0"

    # Sample data
    samples:
      hosts:
        type: csv
        source: samples/hosts.csv
        header: true
      users:
        type: csv
        source: samples/users.csv
        header: true
      databases:
        type: json
        source: samples/databases.json
      queries_select:
        type: json
        source: samples/queries_select.json
      queries_insert:
        type: json
        source: samples/queries_insert.json
      queries_update:
        type: json
        source: samples/queries_update.json
      queries_delete:
        type: json
        source: samples/queries_delete.json

    # Event templates with realistic frequency distribution
    # Weights approximate a production MySQL server with audit logging enabled
    templates:
      # DML queries (general class) — bulk of audit log traffic
      - query_select:
          template: templates/query-select.json.jinja
          chance: 300
      - query_insert:
          template: templates/query-insert.json.jinja
          chance: 80
      - query_update:
          template: templates/query-update.json.jinja
          chance: 100
      - query_delete:
          template: templates/query-delete.json.jinja
          chance: 25

      # Connection events (connection class)
      - connect:
          template: templates/connect.json.jinja
          chance: 130
      - disconnect:
          template: templates/disconnect.json.jinja
          chance: 120
      - connect_failure:
          template: templates/connect-failure.json.jinja
          chance: 20

      # Table access events (table_access class)
      - table_access_read:
          template: templates/table-access-read.json.jinja
          chance: 80
      - table_access_write:
          template: templates/table-access-write.json.jinja
          chance: 40

      # Admin and maintenance queries
      - query_admin:
          template: templates/query-admin.json.jinja
          chance: 50

      # Schema changes (DDL)
      - query_ddl:
          template: templates/query-ddl.json.jinja
          chance: 20

      # Permission changes (GRANT/REVOKE)
      - query_grant:
          template: templates/query-grant.json.jinja
          chance: 8

      # Query errors
      - query_error:
          template: templates/query-error.json.jinja
          chance: 27

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
