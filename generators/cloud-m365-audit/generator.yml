# Microsoft 365 Unified Audit Log Generator
#
# Produces realistic M365 audit events (ECS-compatible JSON) matching the
# Elastic O365 integration field structure. Covers Azure AD / Entra ID,
# Exchange Online, SharePoint / OneDrive, Microsoft Teams, and admin
# operations across a multi-tenant enterprise environment.
#
# Usage:
#   eventum generate --path generators/cloud-m365-audit/generator.yml --id m365-audit --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    params:
      agent_id: "f7a1b2c3-d4e5-6789-abcd-ef1234567890"
      agent_version: "8.17.0"
      error_rate: 5

    samples:
      users:
        type: csv
        source: samples/users.csv
        header: true
      organizations:
        type: csv
        source: samples/organizations.csv
        header: true
      source_ips:
        type: csv
        source: samples/source_ips.csv
        header: true
      sharepoint_sites:
        type: json
        source: samples/sharepoint_sites.json
      files:
        type: json
        source: samples/files.json
      teams:
        type: json
        source: samples/teams.json
      user_agents:
        type: json
        source: samples/user_agents.json

    templates:
      # Azure AD / Entra ID (~30%)
      - aad_user_logged_in:
          template: templates/aad-user-logged-in.json.jinja
          chance: 200
      - aad_user_login_failed:
          template: templates/aad-user-login-failed.json.jinja
          chance: 50
      - aad_password_change:
          template: templates/aad-password-change.json.jinja
          chance: 20
      - aad_add_member:
          template: templates/aad-add-member.json.jinja
          chance: 30

      # Exchange Online (~25%)
      - exchange_mail_accessed:
          template: templates/exchange-mail-accessed.json.jinja
          chance: 150
      - exchange_mail_sent:
          template: templates/exchange-mail-sent.json.jinja
          chance: 80
      - exchange_mailbox_login:
          template: templates/exchange-mailbox-login.json.jinja
          chance: 20

      # SharePoint / OneDrive (~30%)
      - sharepoint_file_accessed:
          template: templates/sharepoint-file-accessed.json.jinja
          chance: 150
      - sharepoint_file_modified:
          template: templates/sharepoint-file-modified.json.jinja
          chance: 50
      - sharepoint_file_shared:
          template: templates/sharepoint-file-shared.json.jinja
          chance: 30
      - sharepoint_file_downloaded:
          template: templates/sharepoint-file-downloaded.json.jinja
          chance: 30
      - sharepoint_file_deleted:
          template: templates/sharepoint-file-deleted.json.jinja
          chance: 20
      - sharepoint_file_uploaded:
          template: templates/sharepoint-file-uploaded.json.jinja
          chance: 20

      # Microsoft Teams (~10%)
      - teams_message_sent:
          template: templates/teams-message-sent.json.jinja
          chance: 50
      - teams_meeting_joined:
          template: templates/teams-meeting-joined.json.jinja
          chance: 30
      - teams_member_added:
          template: templates/teams-member-added.json.jinja
          chance: 20

      # Admin operations (~5%)
      - admin_operation:
          template: templates/admin-operation.json.jinja
          chance: 50

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
