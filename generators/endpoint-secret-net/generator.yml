# Secret Net Studio Endpoint Security Event Generator
#
# Produces realistic Secret Net Studio events in ECS-compatible JSON format,
# covering authentication, mandatory/discretionary access control, device
# control, integrity monitoring, closed software environment, network
# protection, data protection, and audit events — matching the event types
# generated by Secret Net Studio (by Security Code / Код Безопасности)
# endpoint protection and access control solution.
#
# Usage:
#   eventum generate --path generators/endpoint-secret-net/generator.yml --id sn --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # Secret Net Studio environment parameters
    params:
      sn_version: "8.10.0.1573"
      sn_server: "SN-SRV01"
      sn_server_ip: "10.1.0.15"
      domain: "CORP.ACME.COM"
      organization: "ACME Corp"

    # Sample data for realistic field values
    samples:
      hosts:
        type: csv
        source: samples/hosts.csv
        header: true
      users:
        type: csv
        source: samples/users.csv
        header: true
      integrity_objects:
        type: json
        source: samples/integrity_objects.json
      devices:
        type: json
        source: samples/devices.json
      blocked_apps:
        type: json
        source: samples/blocked_apps.json

    # Event templates with realistic frequency distribution
    #
    # Distribution rationale:
    # - Authentication events dominate (login/logout is the most frequent activity)
    # - Discretionary access control fires on file/folder access checks
    # - Integrity control runs periodic checks producing steady volume
    # - Device control triggers on USB/peripheral connect/disconnect
    # - Mandatory access control is less frequent (confidentiality-level ops)
    # - Closed software environment blocks are relatively rare
    # - Network protection events occur at moderate frequency
    # - Data protection (erasure/shadow copy) is rare
    # - Audit events from admin actions are infrequent
    templates:
      # Authentication — login, logout, failed auth, token auth (~25%)
      - authentication:
          template: templates/authentication.json.jinja
          chance: 250

      # Discretionary access control — file/folder permission checks (~18%)
      - discretionary_access:
          template: templates/discretionary-access.json.jinja
          chance: 180

      # Integrity control — file/registry integrity verification (~15%)
      - integrity_control:
          template: templates/integrity-control.json.jinja
          chance: 150

      # Device control — USB/peripheral connect, block, allow (~12%)
      - device_control:
          template: templates/device-control.json.jinja
          chance: 120

      # Mandatory access control — confidentiality level operations (~8%)
      - mandatory_access:
          template: templates/mandatory-access.json.jinja
          chance: 80

      # Closed software environment — blocked/allowed app execution (~7%)
      - closed_environment:
          template: templates/closed-environment.json.jinja
          chance: 70

      # Network protection — firewall rule match, connection block/allow (~7%)
      - network_protection:
          template: templates/network-protection.json.jinja
          chance: 70

      # Data protection — secure erasure, shadow copy events (~4%)
      - data_protection:
          template: templates/data-protection.json.jinja
          chance: 40

      # Audit — admin actions, policy changes, configuration (~4%)
      - audit:
          template: templates/audit.json.jinja
          chance: 40

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
