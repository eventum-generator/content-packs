# Azure Entra ID (Azure AD) Sign-In and Audit Log Generator
#
# Produces realistic Microsoft Entra ID events (ECS-compatible JSON) matching
# the Elastic Azure integration field structure for signinlogs and auditlogs
# data streams. Covers interactive sign-ins, non-interactive (token refresh)
# sign-ins, service principal authentication, and directory audit operations.
#
# Usage:
#   eventum generate --path generators/cloud-azure-entra-id/generator.yml --id entra-id --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    params:
      agent_id: "e3f4a5b6-c7d8-9012-ef01-234567890abc"
      agent_version: "8.17.0"
      tenant_id: "aaaabbbb-0000-cccc-1111-dddd2222eeee"

    samples:
      users:
        type: csv
        source: samples/users.csv
        header: true
      source_ips:
        type: csv
        source: samples/source_ips.csv
        header: true
      locations:
        type: json
        source: samples/locations.json
      applications:
        type: json
        source: samples/applications.json
      service_principals:
        type: json
        source: samples/service_principals.json
      user_agents:
        type: json
        source: samples/user_agents.json
      conditional_access_policies:
        type: json
        source: samples/conditional_access_policies.json
      audit_operations:
        type: json
        source: samples/audit_operations.json
      groups:
        type: json
        source: samples/groups.json
      directory_roles:
        type: json
        source: samples/directory_roles.json

    templates:
      # Interactive sign-ins — success (~30%)
      - signin_interactive_success:
          template: templates/signin-interactive-success.json.jinja
          chance: 300
      # Interactive sign-ins — failure (~10%)
      - signin_interactive_failure:
          template: templates/signin-interactive-failure.json.jinja
          chance: 100
      # Non-interactive sign-ins — success (~25%)
      - signin_noninteractive_success:
          template: templates/signin-noninteractive-success.json.jinja
          chance: 250
      # Non-interactive sign-ins — failure (~5%)
      - signin_noninteractive_failure:
          template: templates/signin-noninteractive-failure.json.jinja
          chance: 50
      # Service principal sign-ins (~15%)
      - signin_service_principal:
          template: templates/signin-service-principal.json.jinja
          chance: 150
      # Audit — directory changes (~15%)
      - audit_directory_change:
          template: templates/audit-directory-change.json.jinja
          chance: 150

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
