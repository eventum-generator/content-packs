# ViPNet Coordinator VPN/Firewall Event Generator
#
# Produces realistic InfoTeCS ViPNet Coordinator HW events (ECS-compatible
# JSON) for a Russian-certified VPN/crypto-gateway and firewall. Covers the
# full VPN lifecycle: tunnel establishment/teardown, node authentication,
# firewall allow/block decisions, encrypted packet processing, unencrypted
# packet alerts (Event 22), time synchronization errors (Event 4),
# configuration changes, and keepalive monitoring.
#
# ViPNet uses GOST cryptographic algorithms (GOST R 34.12-2015 Kuznechik/Magma,
# GOST 28147-89) and operates within a proprietary protected network with
# coordinator-to-coordinator (site-to-site) and client-to-coordinator tunnels.
#
# Usage:
#   eventum generate --path generators/vpn-vipnet/generator.yml --id vipnet --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # Environment parameters — edit for your setup
    params:
      hostname: VIPNET-GW-01
      domain: corp.example.ru
      agent_id: "b7c8d9e0-f1a2-3456-7890-abcdef012345"
      agent_version: "8.17.0"
      max_timediff: 7200

    # Sample data
    samples:
      usernames:
        type: csv
        source: samples/usernames.csv
        header: true
      vipnet_nodes:
        type: json
        source: samples/vipnet_nodes.json
      coordinators:
        type: json
        source: samples/coordinators.json

    # Event templates with realistic frequency distribution
    # Weights approximate a production ViPNet Coordinator environment:
    # - Firewall traffic dominates (allow >> block)
    # - Encrypted packet processing is the core steady-state operation
    # - Tunnel events and auth are session-boundary events (less frequent)
    # - Alerts (unencrypted packets, time sync) are rare but important
    templates:
      - tunnel_established:
          template: templates/tunnel-established.json.jinja
          chance: 50
      - tunnel_destroyed:
          template: templates/tunnel-destroyed.json.jinja
          chance: 40
      - auth_success:
          template: templates/auth-success.json.jinja
          chance: 60
      - auth_failure:
          template: templates/auth-failure.json.jinja
          chance: 8
      - firewall_allowed:
          template: templates/firewall-allowed.json.jinja
          chance: 300
      - firewall_blocked:
          template: templates/firewall-blocked.json.jinja
          chance: 60
      - packet_encrypted:
          template: templates/packet-encrypted.json.jinja
          chance: 250
      - packet_unencrypted:
          template: templates/packet-unencrypted.json.jinja
          chance: 10
      - config_changed:
          template: templates/config-changed.json.jinja
          chance: 5
      - keepalive:
          template: templates/keepalive.json.jinja
          chance: 80
      - time_sync_error:
          template: templates/time-sync-error.json.jinja
          chance: 3

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
