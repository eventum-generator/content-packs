# CrowdStrike Falcon Event Stream Generator
#
# Produces realistic CrowdStrike Falcon Event Stream events (raw JSON)
# covering endpoint detections, authentication audits, user activity audits,
# firewall matches, incident summaries, and remote response sessions.
# Events use the CrowdStrike Event Stream envelope format with metadata
# and event body.
#
# Usage:
#   eventum generate --path generators/security-crowdstrike-falcon/generator.yml --id falcon --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # CrowdStrike environment parameters
    params:
      customer_id: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6"
      falcon_base_url: "https://falcon.crowdstrike.com"

    # Sample data
    samples:
      hosts:
        type: csv
        source: samples/hosts.csv
        header: true
      endpoint_users:
        type: csv
        source: samples/endpoint_users.csv
        header: true
      console_users:
        type: csv
        source: samples/console_users.csv
        header: true
      processes:
        type: json
        source: samples/processes.json
      detection_scenarios:
        type: json
        source: samples/detection_scenarios.json
      firewall_rules:
        type: json
        source: samples/firewall_rules.json
      network_destinations:
        type: json
        source: samples/network_destinations.json
      auth_operations:
        type: json
        source: samples/auth_operations.json
      user_operations:
        type: json
        source: samples/user_operations.json

    # Event templates with realistic frequency distribution
    templates:
      # Endpoint detections — most common event type (~29%)
      - epp_detection:
          template: templates/epp-detection.json.jinja
          chance: 250

      # Authentication audit events (~23%)
      - auth_audit:
          template: templates/auth-audit.json.jinja
          chance: 200

      # User activity audit events (~17%)
      - user_audit:
          template: templates/user-audit.json.jinja
          chance: 150

      # Firewall match events (~17%)
      - firewall_match:
          template: templates/firewall-match.json.jinja
          chance: 150

      # Incident summary events (~6%)
      - incident_summary:
          template: templates/incident-summary.json.jinja
          chance: 50

      # Remote response session start (~3.5%)
      - remote_session_start:
          template: templates/remote-session-start.json.jinja
          chance: 30

      # Remote response session end (~3.5%)
      - remote_session_end:
          template: templates/remote-session-end.json.jinja
          chance: 30

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
