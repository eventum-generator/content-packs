# Kubernetes API Audit Log Generator
#
# Produces realistic Kubernetes API server audit log events (ECS-compatible JSON)
# matching the Elastic Kubernetes audit_logs integration field structure. Events
# cover the full range of K8s API operations: CRUD on resources, watch streams,
# health probes, RBAC access, pod exec/attach, and API discovery.
#
# Usage:
#   eventum generate --path generators/kubernetes-audit/generator.yml --id k8s-audit --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    params:
      agent_id: "6e730a0c-7da5-48ff-b4c9-f6c63844975d"
      agent_version: "8.17.0"
      agent_name: "kind-control-plane"
      cluster_name: "production-cluster"
      error_rate: 3

    samples:
      namespaces:
        type: csv
        source: samples/namespaces.csv
        header: true
      users:
        type: csv
        source: samples/users.csv
        header: true
      source_ips:
        type: csv
        source: samples/source_ips.csv
        header: true
      user_agents:
        type: json
        source: samples/user_agents.json
      resources:
        type: json
        source: samples/resources.json

    # Distribution reflects real K8s cluster traffic:
    # - Health probes are the most frequent (~25% of all audit events)
    # - GET/LIST dominate normal API traffic (~30%)
    # - Watch streams are persistent (~15%)
    # - API discovery is frequent from controllers (~10%)
    # - Mutations (create/update/delete) are less common (~12%)
    # - RBAC operations and exec/attach are rare but security-relevant (~8%)
    templates:
      # --- Health probes (~25%) - most frequent in any cluster ---
      - health_probe:
          template: templates/health-probe.json.jinja
          chance: 80

      # --- GET single resource (~17%) ---
      - get_resource:
          template: templates/get-resource.json.jinja
          chance: 55

      # --- LIST resources (~13%) ---
      - list_resource:
          template: templates/list-resource.json.jinja
          chance: 45

      # --- Watch streams (~15%) ---
      - watch_resource:
          template: templates/watch-resource.json.jinja
          chance: 50

      # --- API discovery (~10%) ---
      - api_discovery:
          template: templates/api-discovery.json.jinja
          chance: 35

      # --- CREATE resource (~5%) ---
      - create_resource:
          template: templates/create-resource.json.jinja
          chance: 15

      # --- UPDATE/PATCH resource (~5%) ---
      - update_resource:
          template: templates/update-resource.json.jinja
          chance: 18

      # --- DELETE resource (~2%) ---
      - delete_resource:
          template: templates/delete-resource.json.jinja
          chance: 8

      # --- RBAC operations (~5%) ---
      - rbac_access:
          template: templates/rbac-access.json.jinja
          chance: 15

      # --- Exec/Attach/PortForward (~3%) ---
      - exec_attach:
          template: templates/exec-attach.json.jinja
          chance: 10

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
