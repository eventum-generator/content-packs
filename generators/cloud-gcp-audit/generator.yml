# GCP Cloud Audit Logs Generator
#
# Produces realistic GCP Cloud Audit Log events (ECS-compatible JSON)
# matching the Elastic GCP audit integration field structure. Events
# can be ingested directly into Elasticsearch or OpenSearch.
#
# Usage:
#   eventum generate --path generators/cloud-gcp-audit/generator.yml --id gcp-audit --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    params:
      agent_id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
      agent_version: "8.17.0"
      error_rate: 4

    samples:
      projects:
        type: csv
        source: samples/projects.csv
        header: true
      service_accounts:
        type: csv
        source: samples/service_accounts.csv
        header: true
      users:
        type: csv
        source: samples/users.csv
        header: true
      source_ips:
        type: csv
        source: samples/source_ips.csv
        header: true
      zones:
        type: csv
        source: samples/zones.csv
        header: true
      instances:
        type: csv
        source: samples/instances.csv
        header: true
      buckets:
        type: csv
        source: samples/buckets.csv
        header: true
      gke_clusters:
        type: csv
        source: samples/gke_clusters.csv
        header: true
      networks:
        type: csv
        source: samples/networks.csv
        header: true
      datasets:
        type: csv
        source: samples/datasets.csv
        header: true
      user_agents:
        type: json
        source: samples/user_agents.json
      error_scenarios:
        type: json
        source: samples/error_scenarios.json

    # Weights: Compute ~30%, IAM ~20%, Storage ~15%, GKE ~10%, Networking ~10%, BigQuery ~8%, DataAccess ~7%
    templates:
      # --- Compute (~30%) ---
      - compute_instances_list:
          template: templates/compute-instances-list.json.jinja
          chance: 60
      - compute_instances_insert:
          template: templates/compute-instances-insert.json.jinja
          chance: 25
      - compute_instances_delete:
          template: templates/compute-instances-delete.json.jinja
          chance: 10
      - compute_instances_stop:
          template: templates/compute-instances-stop.json.jinja
          chance: 15
      - compute_instances_start:
          template: templates/compute-instances-start.json.jinja
          chance: 15
      - compute_instances_get:
          template: templates/compute-instances-get.json.jinja
          chance: 40
      - compute_instances_aggregated_list:
          template: templates/compute-instances-aggregated-list.json.jinja
          chance: 30

      # --- IAM (~20%) ---
      - iam_set_iam_policy:
          template: templates/iam-set-iam-policy.json.jinja
          chance: 30
      - iam_get_iam_policy:
          template: templates/iam-get-iam-policy.json.jinja
          chance: 50
      - iam_create_service_account:
          template: templates/iam-create-service-account.json.jinja
          chance: 10
      - iam_create_service_account_key:
          template: templates/iam-create-service-account-key.json.jinja
          chance: 5
      - console_login:
          template: templates/console-login.json.jinja
          chance: 40

      # --- Storage (~15%) ---
      - storage_objects_get:
          template: templates/storage-objects-get.json.jinja
          chance: 45
      - storage_objects_list:
          template: templates/storage-objects-list.json.jinja
          chance: 30
      - storage_buckets_create:
          template: templates/storage-buckets-create.json.jinja
          chance: 5

      # --- GKE (~10%) ---
      - gke_clusters_get:
          template: templates/gke-clusters-get.json.jinja
          chance: 40
      - gke_clusters_create:
          template: templates/gke-clusters-create.json.jinja
          chance: 5

      # --- Networking (~10%) ---
      - compute_firewalls_insert:
          template: templates/compute-firewalls-insert.json.jinja
          chance: 15
      - compute_networks_insert:
          template: templates/compute-networks-insert.json.jinja
          chance: 5
      - compute_subnetworks_insert:
          template: templates/compute-subnetworks-insert.json.jinja
          chance: 8

      # --- BigQuery (~8%) ---
      - bigquery_insert_job:
          template: templates/bigquery-insert-job.json.jinja
          chance: 30
      - bigquery_insert_table:
          template: templates/bigquery-insert-table.json.jinja
          chance: 5

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
