# UserGate NGFW Event Generator
#
# Produces realistic UserGate NGFW firewall events (ECS-compatible JSON)
# matching UserGate CEF syslog log structure. Events cover traffic forwarding
# (accept/deny), security modules (web filter, IDPS, DNS filter), and
# operational events (system admin, VPN tunnels, user authentication).
#
# UserGate NGFW is a Russian next-generation firewall and UTM appliance with
# built-in firewall, IDS/IPS, web filtering, VPN, and gateway antivirus.
# Logs are exported in CEF (Common Event Format) via syslog.
#
# Usage:
#   eventum generate --path generators/network-usergate/generator.yml --id ug --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # Environment parameters — edit for your setup
    params:
      hostname: ug-fw-01
      domain: example.com
      device_id: "utmcore@usergate-fw01"
      nat_ip: "198.51.100.1"
      agent_id: "f1a2b3c4-5d6e-7f8a-9b0c-d1e2f3a4b5c6"
      agent_version: "8.17.0"

    # Sample data
    samples:
      internal_hosts:
        type: csv
        source: samples/internal_hosts.csv
        header: true
      network_services:
        type: json
        source: samples/network_services.json
      firewall_rules:
        type: json
        source: samples/firewall_rules.json
      ips_signatures:
        type: json
        source: samples/ips_signatures.json
      web_categories:
        type: json
        source: samples/web_categories.json
      users:
        type: json
        source: samples/users.json

    # Event templates with realistic frequency distribution
    # Weights approximate a production enterprise UserGate NGFW deployment
    templates:
      # Traffic logs — ~65% of total volume
      - traffic_accept:
          template: templates/traffic-accept.json.jinja
          chance: 450
      - traffic_deny:
          template: templates/traffic-deny.json.jinja
          chance: 150

      # Security logs — ~20% of total volume
      - web_filter:
          template: templates/web-filter.json.jinja
          chance: 60
      - idps_alert:
          template: templates/idps-alert.json.jinja
          chance: 40
      - dns:
          template: templates/dns.json.jinja
          chance: 50

      # Operational logs — ~15% of total volume
      - system_event:
          template: templates/system-event.json.jinja
          chance: 50
      - auth:
          template: templates/auth.json.jinja
          chance: 40
      - vpn:
          template: templates/vpn.json.jinja
          chance: 30

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
