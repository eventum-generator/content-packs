# InfoWatch Traffic Monitor (DLP) Event Generator
#
# Produces realistic InfoWatch Traffic Monitor DLP events in CEF-over-JSON
# format, covering policy violations, content captures, device control,
# print monitoring, system events, and incident workflow updates --
# matching the event types exported via InfoWatch SIEM integration
# (CEF/syslog to ArcSight, RuSIEM, etc.).
#
# Usage:
#   eventum generate --path generators/dlp-infowatch/generator.yml --id iwtm --live-mode

input:
  # 5 events/second -- DLP systems continuously monitor all channels
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # InfoWatch Traffic Monitor environment parameters
    params:
      hostname: iwtm-srv01
      server_ip: "10.1.0.10"
      iwtm_version: "7.3.0"
      agent_id: "f1ee4a83-b99b-4611-925d-b83b001f8b86"
      agent_version: "8.17.0"

    # Sample data for realistic field values
    samples:
      users:
        type: csv
        source: samples/users.csv
        header: true
      policies:
        type: json
        source: samples/policies.json
      channels:
        type: json
        source: samples/channels.json
      files:
        type: json
        source: samples/files.json
      external_recipients:
        type: json
        source: samples/external_recipients.json

    # Event templates with realistic frequency distribution
    #
    # Distribution rationale:
    # - Content captures are the most frequent (routine monitoring)
    # - Policy violations are the core DLP alerts (~25%)
    # - Device control and print events happen at endpoint level
    # - System events are operational noise
    # - Incident updates reflect analyst workflow
    templates:
      # Policy violation -- DLP rule match triggers alert/block (~25%)
      - policy_violation:
          template: templates/policy-violation.json.jinja
          chance: 250

      # Content capture -- normal traffic interception, no violation (~35%)
      - content_capture:
          template: templates/content-capture.json.jinja
          chance: 350

      # Device control -- USB/removable media detection (~12%)
      - device_control:
          template: templates/device-control.json.jinja
          chance: 120

      # Print control -- printing activity monitoring (~8%)
      - print_control:
          template: templates/print-control.json.jinja
          chance: 80

      # System event -- InfoWatch operational messages (~10%)
      - system_event:
          template: templates/system-event.json.jinja
          chance: 100

      # Incident update -- analyst workflow events (~10%)
      - incident_update:
          template: templates/incident-update.json.jinja
          chance: 100

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
