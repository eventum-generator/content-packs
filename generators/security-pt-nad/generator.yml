# PT Network Attack Discovery (PT NAD) Event Generator
#
# Produces realistic PT NAD detection events in ECS-compatible JSON format,
# covering attack detections (rule-based), reputation/IOC alerts, suspicious
# activity (behavioral), lateral movement, C2 communication, protocol
# anomalies, credential leaks, and network session metadata.
# Events mirror what PT NAD exports via syslog to SIEM systems like
# MaxPatrol SIEM, mapped to ECS-compatible JSON.
#
# Usage:
#   eventum generate --path generators/security-pt-nad/generator.yml --id pt-nad --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # PT NAD environment parameters
    params:
      nad_version: "12.1.0.1234"
      sensor_name: "PT-NAD-01"
      sensor_ip: "10.1.0.100"
      internal_subnet: "10.1"

    # Sample data for realistic field values
    samples:
      hosts:
        type: csv
        source: samples/hosts.csv
        header: true
      users:
        type: csv
        source: samples/users.csv
        header: true
      attack_rules:
        type: json
        source: samples/attack_rules.json
      reputation_indicators:
        type: json
        source: samples/reputation_indicators.json
      suspicious_activities:
        type: json
        source: samples/suspicious_activities.json
      external_ips:
        type: json
        source: samples/external_ips.json
      protocols:
        type: json
        source: samples/protocols.json

    # Event templates with realistic frequency distribution
    #
    # Distribution rationale:
    # - Network sessions are the bulk of traffic (passive metadata)
    # - Attack detections are the core alert type (rule-based, moderate volume)
    # - Suspicious activities are behavioral detections (moderate)
    # - Reputation/IOC alerts trigger on threat intel matches
    # - Protocol anomalies are DPI-based detections
    # - Lateral movement detections are east/west internal alerts
    # - C2 communication is rare but critical (highest severity)
    # - Credential leaks are policy violations (cleartext protocols)
    templates:
      # Network session metadata — parsed protocol sessions (~30%)
      - network_session:
          template: templates/network-session.json.jinja
          chance: 300

      # Attack detection — rule-based threat alerts (~20%)
      - attack_detection:
          template: templates/attack-detection.json.jinja
          chance: 200

      # Suspicious activity — behavioral analysis alerts (~15%)
      - suspicious_activity:
          template: templates/suspicious-activity.json.jinja
          chance: 150

      # Reputation/IOC alert — threat intelligence matches (~10%)
      - reputation_alert:
          template: templates/reputation-alert.json.jinja
          chance: 100

      # Protocol anomaly — DPI-based anomaly detection (~8%)
      - protocol_anomaly:
          template: templates/protocol-anomaly.json.jinja
          chance: 80

      # Lateral movement — east/west internal detections (~7%)
      - lateral_movement:
          template: templates/lateral-movement.json.jinja
          chance: 70

      # C2 communication — outbound C2 channel detection (~5%)
      - connection_to_c2:
          template: templates/connection-to-c2.json.jinja
          chance: 50

      # Credential leak — cleartext credential detection (~5%)
      - credential_leak:
          template: templates/credential-leak.json.jinja
          chance: 50

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
