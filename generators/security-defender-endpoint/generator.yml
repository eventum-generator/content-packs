# Microsoft Defender for Endpoint (EDR) — Advanced Hunting Event Generator
#
# Produces realistic Microsoft Defender for Endpoint Advanced Hunting events
# matching the JSON structure streamed to Microsoft Sentinel via the
# Microsoft 365 Defender connector. Covers 8 event types from the
# DeviceEvents, DeviceProcessEvents, DeviceNetworkEvents, DeviceFileEvents,
# DeviceRegistryEvents, DeviceImageLoadEvents, DeviceLogonEvents, and
# AlertInfo tables.
#
# Usage:
#   eventum generate --path generators/security-defender-endpoint/generator.yml --id mde --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # Environment parameters — edit for your setup
    params:
      tenant: Contoso
      domain: CONTOSO
      fqdn_suffix: contoso.com
      domain_sid: "S-1-5-21-57989841-2025429265-839522115"
      tenant_id: "3adb963c-8e61-48e8-a06d-6dbb0dacea39"

    # Sample data
    samples:
      hosts:
        type: csv
        source: samples/hosts.csv
        header: true
      usernames:
        type: csv
        source: samples/usernames.csv
        header: true
      processes:
        type: json
        source: samples/processes.json
      dlls:
        type: json
        source: samples/dlls.json
      network_destinations:
        type: json
        source: samples/network_destinations.json
      file_operations:
        type: json
        source: samples/file_operations.json
      registry_paths:
        type: json
        source: samples/registry_paths.json
      alert_profiles:
        type: json
        source: samples/alert_profiles.json

    # Event templates with realistic frequency distribution
    # Weights approximate a production MDE deployment
    templates:
      - process_events:
          template: templates/process-events.json.jinja
          chance: 33
      - network_events:
          template: templates/network-events.json.jinja
          chance: 28
      - file_events:
          template: templates/file-events.json.jinja
          chance: 22
      - registry_events:
          template: templates/registry-events.json.jinja
          chance: 9
      - image_load_events:
          template: templates/image-load-events.json.jinja
          chance: 4
      - logon_events:
          template: templates/logon-events.json.jinja
          chance: 2
      - device_events:
          template: templates/device-events.json.jinja
          chance: 1.5
      - alert_info:
          template: templates/alert-info.json.jinja
          chance: 0.5

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
