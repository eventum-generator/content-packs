# Microsoft SQL Server Audit Log Generator
#
# Produces realistic SQL Server audit events (ECS-compatible JSON) matching
# the output of Winlogbeat / Elastic Agent with the microsoft_sqlserver integration.
# All events use Windows Event ID 33205 from the SQL Server Audit channel.
#
# Covers: login/logout, DML (SELECT/INSERT/UPDATE/DELETE), stored procedure
# execution, schema changes (DDL), permission changes, backups, role membership
# changes, password changes, and DBCC commands.
#
# Usage:
#   eventum generate --path generators/database-mssql-audit/generator.yml --id mssql --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # Environment parameters — edit for your setup
    params:
      domain: CONTOSO
      agent_version: "8.17.0"

    # Sample data
    samples:
      hosts:
        type: csv
        source: samples/hosts.csv
        header: true
      logins:
        type: csv
        source: samples/logins.csv
        header: true
      databases:
        type: json
        source: samples/databases.json
      stmts_select:
        type: json
        source: samples/statements_select.json
      stmts_insert:
        type: json
        source: samples/statements_insert.json
      stmts_update:
        type: json
        source: samples/statements_update.json
      stmts_delete:
        type: json
        source: samples/statements_delete.json
      stmts_execute:
        type: json
        source: samples/statements_execute.json
      stmts_backup:
        type: json
        source: samples/statements_backup.json

    # Event templates with realistic frequency distribution
    # Weights approximate a production SQL Server with auditing enabled
    templates:
      - select:
          template: templates/select.json.jinja
          chance: 350
      - login_success:
          template: templates/login-success.json.jinja
          chance: 150
      - logout:
          template: templates/logout.json.jinja
          chance: 140
      - update:
          template: templates/update.json.jinja
          chance: 100
      - insert:
          template: templates/insert.json.jinja
          chance: 80
      - execute:
          template: templates/execute.json.jinja
          chance: 70
      - delete:
          template: templates/delete.json.jinja
          chance: 30
      - login_failure:
          template: templates/login-failure.json.jinja
          chance: 25
      - schema_change:
          template: templates/schema-change.json.jinja
          chance: 23
      - backup:
          template: templates/backup.json.jinja
          chance: 15
      - permission_change:
          template: templates/permission-change.json.jinja
          chance: 10
      - role_member_change:
          template: templates/role-member-change.json.jinja
          chance: 3
      - password_change:
          template: templates/password-change.json.jinja
          chance: 2
      - dbcc:
          template: templates/dbcc.json.jinja
          chance: 2

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
