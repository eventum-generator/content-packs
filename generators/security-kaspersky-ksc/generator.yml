# Kaspersky Security Center (KSC) Event Generator
#
# Produces realistic Kaspersky Security Center events in JSON format,
# covering threat detection, network attacks, task completion, database updates,
# device status, policy events, license management, protection status, and
# administration audit events — matching the event types exported via KSC
# syslog/CEF integration to SIEM systems.
#
# Usage:
#   eventum generate --path generators/security-kaspersky-ksc/generator.yml --id ksc --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # KSC environment parameters
    params:
      ksc_version: "14.2.0.26967"
      ksc_server: "KSC-SRV01"
      ksc_server_ip: "10.1.0.10"
      kes_version: "12.0.0.1131"
      update_source: "https://dnl-01.geo.kaspersky.com/"
      license_type: "Kaspersky Endpoint Security for Business Advanced"
      license_count: 500

    # Sample data for realistic field values
    samples:
      hosts:
        type: csv
        source: samples/hosts.csv
        header: true
      users:
        type: csv
        source: samples/users.csv
        header: true
      threat_scenarios:
        type: json
        source: samples/threat_scenarios.json
      attack_scenarios:
        type: json
        source: samples/attack_scenarios.json
      tasks:
        type: json
        source: samples/tasks.json
      malware_paths:
        type: json
        source: samples/malware_paths.json
      attacker_ips:
        type: json
        source: samples/attacker_ips.json

    # Event templates with realistic frequency distribution
    #
    # Distribution rationale:
    # - Task/update/protection events are the most frequent (operational noise)
    # - Device status checks happen regularly
    # - Threat detections and network attacks are less frequent but significant
    # - Policy and license events are relatively rare
    # - Audit events occur with moderate frequency
    templates:
      # Threat detection — malware/virus found by KES (~12%)
      - threat_detected:
          template: templates/threat-detected.json.jinja
          chance: 120

      # Network attack detection — IDS/IPS events (~8%)
      - network_attack:
          template: templates/network-attack.json.jinja
          chance: 80

      # Task completion — scan, update, patch tasks (~20%)
      - task_completed:
          template: templates/task-completed.json.jinja
          chance: 200

      # Database update status — signature DB updates (~15%)
      - update_status:
          template: templates/update-status.json.jinja
          chance: 150

      # Device status changes — managed device health (~15%)
      - device_status:
          template: templates/device-status.json.jinja
          chance: 150

      # Policy events — applied, violated, changed (~10%)
      - policy_event:
          template: templates/policy-event.json.jinja
          chance: 100

      # License events — expiration, usage, validation (~5%)
      - license_event:
          template: templates/license-event.json.jinja
          chance: 50

      # Protection status — component start/stop/enable/disable (~8%)
      - protection_status:
          template: templates/protection-status.json.jinja
          chance: 80

      # Audit events — admin console activity (~7%)
      - audit_event:
          template: templates/audit-event.json.jinja
          chance: 70

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
