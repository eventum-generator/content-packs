# PostgreSQL Audit Log Generator
#
# Produces realistic PostgreSQL audit events (ECS-compatible JSON) matching
# the output of Filebeat / Elastic Agent with the PostgreSQL integration.
# Covers pgaudit session logs, connection/disconnection events, authentication
# failures, DDL statements, role management, and database errors.
#
# Usage:
#   eventum generate --path generators/database-postgresql/generator.yml --id postgresql --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # Environment parameters — edit for your setup
    params:
      cluster_name: pg-prod-cluster
      pg_version: "16.4"
      agent_version: "8.17.0"

    # Sample data
    samples:
      hosts:
        type: csv
        source: samples/hosts.csv
        header: true
      users:
        type: csv
        source: samples/users.csv
        header: true
      databases:
        type: json
        source: samples/databases.json
      tables:
        type: json
        source: samples/tables.json
      queries_select:
        type: json
        source: samples/queries_select.json
      queries_insert:
        type: json
        source: samples/queries_insert.json
      queries_update:
        type: json
        source: samples/queries_update.json
      queries_delete:
        type: json
        source: samples/queries_delete.json

    # Event templates with realistic frequency distribution
    # Weights approximate a production PostgreSQL server with pgaudit enabled
    templates:
      - select:
          template: templates/select.json.jinja
          chance: 450
      - insert:
          template: templates/insert.json.jinja
          chance: 150
      - update:
          template: templates/update.json.jinja
          chance: 100
      - delete:
          template: templates/delete.json.jinja
          chance: 30
      - connection:
          template: templates/connection.json.jinja
          chance: 100
      - disconnection:
          template: templates/disconnection.json.jinja
          chance: 80
      - auth_failure:
          template: templates/auth-failure.json.jinja
          chance: 20
      - ddl:
          template: templates/ddl.json.jinja
          chance: 30
      - role:
          template: templates/role.json.jinja
          chance: 20
      - error:
          template: templates/error.json.jinja
          chance: 20

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
