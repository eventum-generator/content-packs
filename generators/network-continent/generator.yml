# Network Continent (GeoIP-Enriched Traffic) Event Generator
#
# Produces realistic network traffic events enriched with geographic/continent-level
# information (ECS-compatible JSON). Simulates the output of a GeoIP enrichment
# pipeline applied to network flow data — the kind of events seen in Elastic
# Security's network map visualization.
#
# Event types:
#   - Cross-continent traffic (outbound to different continents)
#   - Same-continent traffic (regional/CDN traffic)
#   - Inbound traffic (external → DMZ/servers with geo enrichment)
#   - Denied/blocked traffic (with geo context for threat analysis)
#
# Usage:
#   eventum generate --path generators/network-continent/generator.yml --id geocontinent --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # Environment parameters — edit for your setup
    params:
      observer_hostname: gw-edge-01
      observer_domain: example.com
      observer_ip: "198.51.100.1"
      internal_continent_code: "NA"
      internal_continent_name: "North America"
      internal_country_iso_code: "US"
      internal_country_name: "United States"
      internal_region_name: "Virginia"
      internal_city_name: "Ashburn"
      internal_lat: 39.0438
      internal_lon: -77.4874
      internal_timezone: "America/New_York"
      agent_id: "b2c3d4e5-f6a7-8901-bcde-f01234567890"
      agent_version: "8.17.0"

    # Sample data
    samples:
      geo_locations:
        type: json
        source: samples/geo_locations.json
      services:
        type: json
        source: samples/services.json
      internal_hosts:
        type: csv
        source: samples/internal_hosts.csv
        header: true
      as_numbers:
        type: json
        source: samples/as_numbers.json

    # Event templates with realistic distribution
    # Cross-continent dominates (enterprise traffic to global CDNs/SaaS),
    # same-continent is common (regional services), inbound less so,
    # denied traffic rare but important for security analytics
    templates:
      - cross_continent_outbound:
          template: templates/geo-traffic.json.jinja
          chance: 450
          vars:
            traffic_direction: "outbound"
            cross_continent: true
            event_outcome: "success"
            event_action: "allow"
      - same_continent_outbound:
          template: templates/geo-traffic.json.jinja
          chance: 200
          vars:
            traffic_direction: "outbound"
            cross_continent: false
            event_outcome: "success"
            event_action: "allow"
      - cross_continent_inbound:
          template: templates/geo-traffic.json.jinja
          chance: 120
          vars:
            traffic_direction: "inbound"
            cross_continent: true
            event_outcome: "success"
            event_action: "allow"
      - same_continent_inbound:
          template: templates/geo-traffic.json.jinja
          chance: 80
          vars:
            traffic_direction: "inbound"
            cross_continent: false
            event_outcome: "success"
            event_action: "allow"
      - cross_continent_denied:
          template: templates/geo-traffic.json.jinja
          chance: 40
          vars:
            traffic_direction: "inbound"
            cross_continent: true
            event_outcome: "failure"
            event_action: "deny"
      - same_continent_denied:
          template: templates/geo-traffic.json.jinja
          chance: 10
          vars:
            traffic_direction: "inbound"
            cross_continent: false
            event_outcome: "failure"
            event_action: "deny"

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
