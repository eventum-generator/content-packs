# Okta Identity Provider System Log Generator
#
# Produces realistic Okta System Log events (ECS-compatible JSON) matching the
# Elastic Okta integration field structure. Covers SSO sign-in logs, MFA events,
# admin audit events, user lifecycle management, group and application membership
# changes, and policy evaluations across an enterprise Okta tenant.
#
# Usage:
#   eventum generate --path generators/identity-okta/generator.yml --id okta --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    params:
      agent_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      agent_name: "okta-system-forwarder"
      agent_version: "8.17.0"

    samples:
      users:
        type: csv
        source: samples/users.csv
        header: true
      applications:
        type: json
        source: samples/applications.json
      source_ips:
        type: csv
        source: samples/source_ips.csv
        header: true
      user_agents:
        type: json
        source: samples/user_agents.json
      mfa_factors:
        type: json
        source: samples/mfa_factors.json

    templates:
      # SSO sign-in events (~35%)
      - user_session_start:
          template: templates/user-session-start.json.jinja
          chance: 200
      - user_session_start_failed:
          template: templates/user-session-start-failed.json.jinja
          chance: 40
      - user_session_end:
          template: templates/user-session-end.json.jinja
          chance: 80
      - user_authentication_sso:
          template: templates/user-authentication-sso.json.jinja
          chance: 180

      # MFA events (~20%)
      - user_authentication_auth_via_mfa:
          template: templates/user-authentication-auth-via-mfa.json.jinja
          chance: 120
      - user_mfa_factor_verify:
          template: templates/user-mfa-factor-verify.json.jinja
          chance: 80
      - user_mfa_factor_update:
          template: templates/user-mfa-factor-update.json.jinja
          chance: 15

      # Policy evaluation (~10%)
      - policy_evaluate_sign_on:
          template: templates/policy-evaluate-sign-on.json.jinja
          chance: 100

      # Account management (~10%)
      - user_account_lock:
          template: templates/user-account-lock.json.jinja
          chance: 10
      - user_account_update_password:
          template: templates/user-account-update-password.json.jinja
          chance: 20
      - user_account_reset_password:
          template: templates/user-account-reset-password.json.jinja
          chance: 10

      # User lifecycle (~10%)
      - user_lifecycle_create:
          template: templates/user-lifecycle-create.json.jinja
          chance: 10
      - user_lifecycle_activate:
          template: templates/user-lifecycle-activate.json.jinja
          chance: 10
      - user_lifecycle_deactivate:
          template: templates/user-lifecycle-deactivate.json.jinja
          chance: 5

      # Group and application membership (~10%)
      - group_user_membership_add:
          template: templates/group-user-membership-add.json.jinja
          chance: 30
      - application_user_membership_add:
          template: templates/application-user-membership-add.json.jinja
          chance: 25

      # Admin operations (~5%)
      - user_session_access_admin_app:
          template: templates/user-session-access-admin-app.json.jinja
          chance: 20
      - system_api_token_create:
          template: templates/system-api-token-create.json.jinja
          chance: 5

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
