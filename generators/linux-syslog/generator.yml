# Linux Syslog Event Log Generator
#
# Produces realistic Linux syslog events (ECS-compatible JSON) matching
# the output of Filebeat / Elastic Agent with the system integration.
# Events cover SSH, sudo, cron, systemd, kernel, PAM, DHCP, postfix,
# package management, and rsyslog internal messages.
#
# Usage:
#   eventum generate --path generators/linux-syslog/generator.yml --id syslog --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # Environment parameters — edit for your setup
    params:
      fqdn_suffix: example.com
      agent_version: "8.17.0"
      network_prefix: "10.1"

    # Sample data
    samples:
      hosts:
        type: csv
        source: samples/hosts.csv
        header: true
      usernames:
        type: csv
        source: samples/usernames.csv
        header: true
      services:
        type: json
        source: samples/services.json
      cron_jobs:
        type: json
        source: samples/cron_jobs.json
      mail_addresses:
        type: json
        source: samples/mail_addresses.json
      firewall_rules:
        type: json
        source: samples/firewall_rules.json
      packages:
        type: json
        source: samples/packages.json

    # Event templates with realistic frequency distribution
    # Weights approximate a production Linux server fleet
    templates:
      - sshd_auth:
          template: templates/sshd-auth.json.jinja
          chance: 150
      - sshd_session:
          template: templates/sshd-session.json.jinja
          chance: 70
      - sudo:
          template: templates/sudo.json.jinja
          chance: 100
      - su:
          template: templates/su.json.jinja
          chance: 20
      - cron:
          template: templates/cron.json.jinja
          chance: 120
      - systemd_lifecycle:
          template: templates/systemd-lifecycle.json.jinja
          chance: 150
      - kernel_firewall:
          template: templates/kernel-firewall.json.jinja
          chance: 40
      - kernel_generic:
          template: templates/kernel-generic.json.jinja
          chance: 65
      - pam:
          template: templates/pam.json.jinja
          chance: 50
      - dhcp:
          template: templates/dhcp.json.jinja
          chance: 30
      - postfix:
          template: templates/postfix.json.jinja
          chance: 40
      - package_mgmt:
          template: templates/package-mgmt.json.jinja
          chance: 30
      - rsyslog:
          template: templates/rsyslog.json.jinja
          chance: 10

output:
  - stdout:
      formatter:
        format: json
