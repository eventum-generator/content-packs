# AWS VPC Flow Log Generator
#
# Produces realistic AWS VPC Flow Log events (ECS-compatible JSON) matching
# the Elastic AWS VPC Flow integration field structure. Events simulate
# network traffic captured by VPC Flow Logs across multiple accounts, VPCs,
# and availability zones with realistic protocol/port distributions.
#
# Usage:
#   eventum generate --path generators/cloud-aws-vpc-flow/generator.yml --id vpcflow --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # Environment parameters — edit for your setup
    params:
      agent_id: "c4d5e6f7-a8b9-0123-cdef-456789abcdef"
      agent_version: "8.17.0"

    # Sample data
    samples:
      accounts:
        type: csv
        source: samples/accounts.csv
        header: true
      regions:
        type: csv
        source: samples/regions.csv
        header: true
      enis:
        type: csv
        source: samples/enis.csv
        header: true
      common_services:
        type: json
        source: samples/common_services.json

    # Event templates with realistic frequency distribution
    # Weights approximate production VPC traffic patterns
    templates:
      # ~50% accepted TCP (web, database, SSH, API traffic)
      - accepted_tcp:
          template: templates/accepted-tcp.json.jinja
          chance: 500

      # ~15% accepted UDP (DNS, NTP, syslog, SNMP)
      - accepted_udp:
          template: templates/accepted-udp.json.jinja
          chance: 150

      # ~8% rejected TCP (security group denies, port scans)
      - rejected_tcp:
          template: templates/rejected-tcp.json.jinja
          chance: 80

      # ~3% rejected UDP (blocked DNS, probes)
      - rejected_udp:
          template: templates/rejected-udp.json.jinja
          chance: 30

      # ~10% accepted HTTPS/TLS high-volume (large transfers, S3, API gateways)
      - accepted_tcp_bulk:
          template: templates/accepted-tcp-bulk.json.jinja
          chance: 100

      # ~2% accepted ICMP (ping, traceroute, path MTU discovery)
      - accepted_icmp:
          template: templates/accepted-icmp.json.jinja
          chance: 20

      # ~1% rejected ICMP (blocked ping from external)
      - rejected_icmp:
          template: templates/rejected-icmp.json.jinja
          chance: 10

      # ~5% NODATA (no traffic on interface during aggregation interval)
      - nodata:
          template: templates/nodata.json.jinja
          chance: 50

      # ~1% SKIPDATA (internal capacity skip during aggregation)
      - skipdata:
          template: templates/skipdata.json.jinja
          chance: 10

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
