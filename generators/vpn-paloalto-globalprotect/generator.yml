# Palo Alto Networks GlobalProtect VPN Event Generator
#
# Produces realistic PAN-OS GlobalProtect VPN events (ECS-compatible JSON)
# matching the Elastic panw integration field structure. Covers the full
# VPN lifecycle: portal prelogin, authentication, configuration retrieval,
# gateway connection, IPSec tunnel setup, HIP checks, latency monitoring,
# config release, and logout.
#
# Usage:
#   eventum generate --path generators/vpn-paloalto-globalprotect/generator.yml --id gp-vpn --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # Environment parameters — edit for your setup
    params:
      hostname: PA-5260
      serial_number: "007200001056"
      domain: CORP
      virtual_sys: vsys1
      agent_id: "e4f8c1a2-9b3d-4e5f-a6c7-d8e9f0a1b2c3"
      agent_version: "8.17.0"

    # Sample data
    samples:
      usernames:
        type: csv
        source: samples/usernames.csv
        header: true
      client_platforms:
        type: json
        source: samples/client_platforms.json
      gateways:
        type: json
        source: samples/gateways.json
      machines:
        type: json
        source: samples/machines.json

    # Event templates with realistic frequency distribution
    # Weights approximate a production GlobalProtect deployment
    templates:
      - portal_prelogin:
          template: templates/portal-prelogin.json.jinja
          chance: 100
      - portal_auth:
          template: templates/portal-auth.json.jinja
          chance: 80
      - portal_getconfig:
          template: templates/portal-getconfig.json.jinja
          chance: 80
      - gateway_auth:
          template: templates/gateway-auth.json.jinja
          chance: 100
      - gateway_auth_failure:
          template: templates/gateway-auth-failure.json.jinja
          chance: 5
      - gateway_getconfig:
          template: templates/gateway-getconfig.json.jinja
          chance: 80
      - gateway_setup_ipsec:
          template: templates/gateway-setup-ipsec.json.jinja
          chance: 80
      - gateway_hip_check:
          template: templates/gateway-hip-check.json.jinja
          chance: 200
      - gateway_tunnel_latency:
          template: templates/gateway-tunnel-latency.json.jinja
          chance: 150
      - gateway_config_release:
          template: templates/gateway-config-release.json.jinja
          chance: 30
      - gateway_logout:
          template: templates/gateway-logout.json.jinja
          chance: 50

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
