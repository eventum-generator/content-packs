# Kaspersky Web Traffic Security (KWTS) Proxy Event Generator
#
# Produces realistic KWTS web proxy/traffic processing events (ECS-compatible JSON)
# matching the syslog field structure documented for KWTS 6.1. Events cover:
# allowed traffic, blocked by URL policy, blocked by antivirus scan,
# blocked by anti-phishing, and redirected traffic.
#
# KWTS is an enterprise web gateway security product that scans HTTP/HTTPS/FTP
# traffic passing through a proxy server. It integrates with Squid proxy and
# provides antivirus, anti-phishing, URL filtering, and content filtering.
#
# Usage:
#   eventum generate --path generators/proxy-kaspersky-kwts/generator.yml --id kwts --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # Environment parameters
    params:
      # KWTS appliance settings
      kwts_hostname: kwts-node01.corp.example.com
      kwts_version: "6.1.0.4372"
      # Corporate proxy
      proxy_hostname: proxy-gw01.corp.example.com
      proxy_ip: "10.10.0.1"
      # Organization
      company_domain: corp.example.com
      # Elastic agent
      agent_id: "b7e3f1a2-9c4d-4e6f-8a1b-2c3d4e5f6789"
      agent_version: "8.17.0"

    # Sample data files
    samples:
      users:
        type: csv
        source: samples/users.csv
        header: true
      hosts:
        type: csv
        source: samples/hosts.csv
        header: true
      url_categories_allowed:
        type: json
        source: samples/url_categories_allowed.json
      url_categories_blocked:
        type: json
        source: samples/url_categories_blocked.json
      threats:
        type: json
        source: samples/threats.json

    # Event templates with realistic frequency distribution
    # Weights approximate a corporate proxy with KWTS security scanning
    templates:
      # ~75% allowed traffic — normal browsing, business apps, updates
      - allowed:
          template: templates/allowed.json.jinja
          chance: 750

      # ~10% allowed but scanned (virus not detected, clean pass)
      - allowed_scanned:
          template: templates/allowed-scanned.json.jinja
          chance: 100

      # ~6% blocked by URL filtering policy (adult, gambling, anonymizers)
      - blocked_policy:
          template: templates/blocked-policy.json.jinja
          chance: 60

      # ~4% blocked by antivirus (malware, trojans, exploits detected)
      - blocked_av:
          template: templates/blocked-av.json.jinja
          chance: 40

      # ~3% blocked by anti-phishing (phishing URLs detected via KSN/heuristics)
      - blocked_ap:
          template: templates/blocked-ap.json.jinja
          chance: 30

      # ~2% redirected (policy redirect to warning/block page)
      - redirected:
          template: templates/redirected.json.jinja
          chance: 20

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
