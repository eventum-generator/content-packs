# Kaspersky Anti Targeted Attack Platform (KATA) Event Generator
#
# Produces realistic KATA detection events in JSON format,
# covering file detections (web/mail/endpoint), URL detections (web/mail),
# IDS events, DNS request detections, IOC scanning, TAA (Targeted Attack
# Analyzer) behavioral detections, and heartbeat status messages.
# Events follow CEF field mappings from KATA syslog integration,
# mapped to ECS-compatible JSON.
#
# Usage:
#   eventum generate --path generators/security-kaspersky-kata/generator.yml --id kata --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # KATA environment parameters
    params:
      kata_version: "7.1.1.531"
      central_node: "KATA-CN01"
      central_node_ip: "10.1.0.50"
      dns_server_ip: "10.1.1.10"

    # Sample data for realistic field values
    samples:
      hosts:
        type: csv
        source: samples/hosts.csv
        header: true
      users:
        type: csv
        source: samples/users.csv
        header: true
      file_detections:
        type: json
        source: samples/file_detections.json
      url_detections:
        type: json
        source: samples/url_detections.json
      ids_rules:
        type: json
        source: samples/ids_rules.json
      dns_detections:
        type: json
        source: samples/dns_detections.json
      ioc_indicators:
        type: json
        source: samples/ioc_indicators.json
      malicious_domains:
        type: json
        source: samples/malicious_domains.json
      external_ips:
        type: json
        source: samples/external_ips.json
      mail_subjects:
        type: json
        source: samples/mail_subjects.json
      sandbox_verdicts:
        type: json
        source: samples/sandbox_verdicts.json

    # Event templates with realistic frequency distribution
    #
    # Distribution rationale:
    # - IDS events are the most frequent (network-level, high volume)
    # - File detections from web and endpoint are common
    # - URL detections from web traffic are frequent
    # - DNS detections happen regularly as KATA monitors DNS queries
    # - Mail-based detections are less frequent (filtered upstream)
    # - IOC/TAA behavioral detections are rarer (targeted analysis)
    # - Heartbeat messages are periodic health checks
    templates:
      # File from web — downloaded malware detected (~15%)
      - file_web:
          template: templates/file-web.json.jinja
          chance: 150

      # File from mail — malicious attachment detected (~10%)
      - file_mail:
          template: templates/file-mail.json.jinja
          chance: 100

      # IDS event — network intrusion detection (~20%)
      - ids_event:
          template: templates/ids-event.json.jinja
          chance: 200

      # URL from web — malicious URL access detected (~12%)
      - url_web:
          template: templates/url-web.json.jinja
          chance: 120

      # URL from mail — malicious link in email detected (~8%)
      - url_mail:
          template: templates/url-mail.json.jinja
          chance: 80

      # DNS request — suspicious domain query detected (~12%)
      - dns_detection:
          template: templates/dns-detection.json.jinja
          chance: 120

      # File from endpoint — suspicious file on host detected (~10%)
      - file_endpoint:
          template: templates/file-endpoint.json.jinja
          chance: 100

      # IOC scanning — indicator of compromise match (~5%)
      - ioc_scanning:
          template: templates/ioc-scanning.json.jinja
          chance: 50

      # TAA scanning — behavioral analysis detection (~5%)
      - taa_scanning:
          template: templates/taa-scanning.json.jinja
          chance: 50

      # Heartbeat — periodic component health status (~3%)
      - heartbeat:
          template: templates/heartbeat.json.jinja
          chance: 30

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
