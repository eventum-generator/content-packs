# AWS CloudTrail Management Event Generator
#
# Produces realistic AWS CloudTrail management events (ECS-compatible JSON)
# matching the Elastic AWS CloudTrail integration field structure. Events
# can be ingested directly into Elasticsearch or OpenSearch.
#
# Usage:
#   eventum generate --path generators/cloud-aws-cloudtrail/generator.yml --id cloudtrail --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    params:
      agent_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      agent_version: "8.17.0"
      event_version: "1.09"
      error_rate: 4

    samples:
      accounts:
        type: csv
        source: samples/accounts.csv
        header: true
      users:
        type: csv
        source: samples/users.csv
        header: true
      roles:
        type: csv
        source: samples/roles.csv
        header: true
      regions:
        type: csv
        source: samples/regions.csv
        header: true
      source_ips:
        type: csv
        source: samples/source_ips.csv
        header: true
      instances:
        type: csv
        source: samples/instances.csv
        header: true
      buckets:
        type: csv
        source: samples/buckets.csv
        header: true
      security_groups:
        type: csv
        source: samples/security_groups.csv
        header: true
      user_agents:
        type: json
        source: samples/user_agents.json
      error_scenarios:
        type: json
        source: samples/error_scenarios.json

    templates:
      - assume_role:
          template: templates/assume-role.json.jinja
          chance: 180
      - describe_instances:
          template: templates/describe-instances.json.jinja
          chance: 80
      - get_caller_identity:
          template: templates/get-caller-identity.json.jinja
          chance: 50
      - describe_security_groups:
          template: templates/describe-security-groups.json.jinja
          chance: 40
      - describe_volumes:
          template: templates/describe-volumes.json.jinja
          chance: 30
      - describe_vpcs:
          template: templates/describe-vpcs.json.jinja
          chance: 25
      - describe_regions:
          template: templates/describe-regions.json.jinja
          chance: 20
      - list_buckets:
          template: templates/list-buckets.json.jinja
          chance: 20
      - get_user_policy:
          template: templates/get-user-policy.json.jinja
          chance: 15
      - get_policy:
          template: templates/get-policy.json.jinja
          chance: 15
      - list_roles:
          template: templates/list-roles.json.jinja
          chance: 15
      - list_users:
          template: templates/list-users.json.jinja
          chance: 10
      - console_login:
          template: templates/console-login.json.jinja
          chance: 30
      - run_instances:
          template: templates/run-instances.json.jinja
          chance: 10
      - stop_instances:
          template: templates/stop-instances.json.jinja
          chance: 8
      - start_instances:
          template: templates/start-instances.json.jinja
          chance: 8
      - create_security_group:
          template: templates/create-security-group.json.jinja
          chance: 3
      - authorize_sg_ingress:
          template: templates/authorize-sg-ingress.json.jinja
          chance: 3
      - attach_role_policy:
          template: templates/attach-role-policy.json.jinja
          chance: 2
      - create_user:
          template: templates/create-user.json.jinja
          chance: 1
      - create_access_key:
          template: templates/create-access-key.json.jinja
          chance: 1
      - terminate_instances:
          template: templates/terminate-instances.json.jinja
          chance: 1

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
