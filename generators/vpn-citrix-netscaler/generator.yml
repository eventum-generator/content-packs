# Citrix NetScaler Gateway VPN Event Generator
#
# Produces realistic Citrix ADC / NetScaler Gateway VPN syslog events
# (ECS-compatible JSON) matching the output of the Elastic Agent citrix_adc
# integration. Events cover the full SSL VPN session lifecycle: authentication,
# login, ICA application launches, TCP/UDP connections, HTTP resource access,
# session timeouts, and logout with traffic statistics.
#
# NetScaler native syslog format:
#   <timestamp> <hostname> <ppe> : <facility> <module> <event> <id> <pri> : <message>
#
# Usage:
#   eventum generate --path generators/vpn-citrix-netscaler/generator.yml --id netscaler --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # Environment parameters — edit for your setup
    params:
      hostname: NSGW-01
      domain: corp.example.com
      vserver_ip: "10.200.1.10"
      vserver_port: 443
      nat_ip: "203.0.113.50"
      internal_network: "10.100"
      agent_id: "c3d4e5f6-a7b8-9012-cdef-345678901234"
      agent_version: "8.17.0"

    # Sample data
    samples:
      usernames:
        type: csv
        source: samples/usernames.csv
        header: true
      client_types:
        type: json
        source: samples/client_types.json
      ica_apps:
        type: json
        source: samples/ica_apps.json

    # Event templates with realistic frequency distribution
    # Weights approximate a production NetScaler Gateway VPN environment
    # Login/logout are session boundaries; ICA/TCP/HTTP are in-session activity
    templates:
      - sslvpn_login:
          template: templates/sslvpn-login.json.jinja
          chance: 100
      - aaa_login_failed:
          template: templates/aaa-login-failed.json.jinja
          chance: 8
      - sslvpn_logout:
          template: templates/sslvpn-logout.json.jinja
          chance: 55
      - ica_start:
          template: templates/ica-start.json.jinja
          chance: 180
      - ica_end:
          template: templates/ica-end.json.jinja
          chance: 120
      - tcp_connstat:
          template: templates/tcp-connstat.json.jinja
          chance: 200
      - udp_flowstat:
          template: templates/udp-flowstat.json.jinja
          chance: 40
      - http_request:
          template: templates/http-request.json.jinja
          chance: 150
      - tcp_conn_timedout:
          template: templates/tcp-conn-timedout.json.jinja
          chance: 25
      - sslvpn_clisec_check:
          template: templates/clisec-check.json.jinja
          chance: 15
      - license_limit:
          template: templates/license-limit.json.jinja
          chance: 7

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
