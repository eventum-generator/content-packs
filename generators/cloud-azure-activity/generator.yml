# Azure Activity Log Generator
#
# Produces realistic Azure Activity Log events (ECS-compatible JSON)
# matching the Elastic Azure activitylogs integration field structure.
# Events cover all 7 activity log categories: Administrative, Policy,
# Security, ServiceHealth, Autoscale, ResourceHealth, and Alert.
#
# Usage:
#   eventum generate --path generators/cloud-azure-activity/generator.yml --id azure-activity --live-mode

input:
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    params:
      agent_id: "f1a2b3c4-d5e6-7890-abcd-ef1234567890"
      agent_version: "8.17.0"
      tenant_id: "aaaabbbb-0000-cccc-1111-dddd2222eeee"
      error_rate: 5

    samples:
      subscriptions:
        type: csv
        source: samples/subscriptions.csv
        header: true
      resource_groups:
        type: csv
        source: samples/resource_groups.csv
        header: true
      users:
        type: csv
        source: samples/users.csv
        header: true
      regions:
        type: csv
        source: samples/regions.csv
        header: true
      source_ips:
        type: csv
        source: samples/source_ips.csv
        header: true
      admin_write_ops:
        type: json
        source: samples/admin_write_ops.json
      admin_delete_ops:
        type: json
        source: samples/admin_delete_ops.json
      admin_action_ops:
        type: json
        source: samples/admin_action_ops.json
      policy_ops:
        type: json
        source: samples/policy_ops.json
      security_alerts:
        type: json
        source: samples/security_alerts.json
      service_health:
        type: json
        source: samples/service_health.json
      affected_services:
        type: json
        source: samples/affected_services.json
      autoscale_resources:
        type: json
        source: samples/autoscale_resources.json
      alert_rules:
        type: json
        source: samples/alert_rules.json
      policy_definitions:
        type: json
        source: samples/policy_definitions.json
      resource_health_types:
        type: json
        source: samples/resource_health_types.json
      user_agents:
        type: json
        source: samples/user_agents.json

    templates:
      # Administrative — resource write (~40%)
      - admin_write:
          template: templates/admin-write.json.jinja
          chance: 400
      # Administrative — resource action (~25%)
      - admin_action:
          template: templates/admin-action.json.jinja
          chance: 250
      # Administrative — resource delete (~5%)
      - admin_delete:
          template: templates/admin-delete.json.jinja
          chance: 50
      # Policy compliance events (~12%)
      - policy_compliance:
          template: templates/policy-compliance.json.jinja
          chance: 120
      # Security alerts (~5%)
      - security_alert:
          template: templates/security-alert.json.jinja
          chance: 50
      # Service health events (~5%)
      - service_health:
          template: templates/service-health.json.jinja
          chance: 50
      # Autoscale actions (~3%)
      - autoscale:
          template: templates/autoscale.json.jinja
          chance: 30
      # Resource health changes (~3%)
      - resource_health:
          template: templates/resource-health.json.jinja
          chance: 30
      # Alert events (~2%)
      - alert:
          template: templates/alert.json.jinja
          chance: 20

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
