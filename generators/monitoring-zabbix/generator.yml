# Zabbix Monitoring — Eventum Generator
# Produces ECS-compatible events matching Zabbix Server event model
# Covers: Trigger problems/recoveries, acknowledgments, discovery, autoregistration, internal events
#
# Event sources modeled (Zabbix API event.source):
#   0 — Trigger events (problem + recovery)
#   1 — Discovery rule events
#   2 — Active agent autoregistration events
#   3 — Internal events (unsupported items, unknown triggers, failed LLD)
#
# Severity levels (Zabbix trigger severity):
#   0=Not classified, 1=Information, 2=Warning, 3=Average, 4=High, 5=Disaster

input:
  # 5 events per second (~300/min, ~18K/hour)
  # Adjust 'count' to control event rate
  - cron:
      expression: "* * * * * *"
      count: 5

event:
  template:
    mode: chance

    # Environment-specific parameters — edit to match your Zabbix deployment
    params:
      zabbix_server: zabbix-srv01
      zabbix_server_ip: "10.1.0.5"
      zabbix_version: "7.0.6"
      agent_version: "7.0.6"

    # Sample data for realistic field values
    samples:
      hosts:
        type: csv
        source: samples/hosts.csv
        header: true
      trigger_scenarios:
        type: json
        source: samples/trigger_scenarios.json
      discovery_scenarios:
        type: json
        source: samples/discovery_scenarios.json
      services:
        type: json
        source: samples/services.json
      users:
        type: csv
        source: samples/users.csv
        header: true

    # Event templates with chance weights reflecting realistic Zabbix event distribution
    # In a typical deployment: trigger events dominate, discovery/internal are periodic
    templates:
      # --- Trigger Events (source=0) ---
      # Problem events — new alerts firing from trigger threshold breaches
      - trigger_problem:
          template: templates/trigger-problem.json.jinja
          chance: 40

      # Recovery events — resolved problems, correlated with prior problem events
      # Uses shared state to maintain problem-recovery correlation
      - trigger_recovery:
          template: templates/trigger-recovery.json.jinja
          chance: 25

      # --- Operator Actions ---
      # Acknowledgment/update events — operators responding to open problems
      - acknowledge:
          template: templates/acknowledge.json.jinja
          chance: 15

      # --- Internal Events (source=3) ---
      # Item/trigger/LLD state changes — unsupported items, unknown triggers
      - internal:
          template: templates/internal.json.jinja
          chance: 10

      # --- Discovery Events (source=1) ---
      # Network discovery results — host/service up/down from scheduled scans
      - discovery:
          template: templates/discovery.json.jinja
          chance: 7

      # --- Autoregistration Events (source=2) ---
      # New agents joining the monitored infrastructure
      - autoregistration:
          template: templates/autoregistration.json.jinja
          chance: 3

output:
  - file:
      path: output/events.json
      write_mode: overwrite
      formatter:
        format: json
